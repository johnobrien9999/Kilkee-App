<!DOCTYPE html>
<!-- update -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kilkee</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "San Francisco", sans-serif;
    background: linear-gradient(to bottom, #0a1a2f, #0f2c4d);
    color: white;
}

.header {
    padding: 20px;
    font-size: 28px;
    font-weight: 600;
}

.container {
    padding: 15px;
}

.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 15px;
}

.card h2 {
    margin: 0 0 10px 0;
    font-size: 18px;
    font-weight: 500;
}

canvas {
    width: 100% !important;
    height: 200px !important;
}
</style>
</head>

<body>

<div class="header">
    Kilkee Dashboard
</div>

<div class="container">

    <div class="card">
        <h2>🌊 Tide</h2>
        <canvas id="tideChart"></canvas>
    </div>

    <div class="card">
        <h2>🌤 Weather (°C)</h2>
        <canvas id="weatherChart"></canvas>
    </div>

    <div class="card">
        <h2>🌧 Precipitation (%)</h2>
        <canvas id="rainChart"></canvas>
    </div>

</div>

<script>
// Shared labels (time of day)
const labels = ['6am','9am','12pm','3pm','6pm','9pm'];

// 🌊 TIDE
new Chart(document.getElementById('tideChart'), {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Tide Level (m)',
            data: [1.2, 2.9, 1.6, 3.8, 2.4, 1.9],
            tension: 0.4,
            fill: true
        }]
    },
    options: {
        plugins: { legend: { display: false } }
    }
});

// 🌤 WEATHER (TEMP)
new Chart(document.getElementById('weatherChart'), {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Temperature',
            data: [14, 16, 18, 19, 17, 15],
            tension: 0.4
        }]
    },
    options: {
        plugins: { legend: { display: false } }
    }
});

// 🌧 PRECIPITATION
new Chart(document.getElementById('rainChart'), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Rain Chance',
            data: [10, 20, 40, 60, 30, 15],
        }]
    },
    options: {
        plugins: { legend: { display: false } }
    }
});
</script>

</body>
</html>
