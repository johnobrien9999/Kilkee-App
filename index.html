<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kilkee App</title>

<!-- ✅ THIS IS THE IMPORTANT PART (Chart.js) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: #0b1a2a;
    color: white;
}

.container {
    padding: 20px;
}

.card {
    background: #132a44;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
}

h1 {
    margin-top: 0;
}
</style>
</head>

<body>

<div class="container">

    <h1>Kilkee</h1>

    <div class="card">
        <h2>Tide</h2>
        <canvas id="tideChart"></canvas>
    </div>

    <div class="card">
        <h2>Sky</h2>
        <canvas id="skyChart"></canvas>
    </div>

</div>

<script>
const tideCtx = document.getElementById('tideChart');

new Chart(tideCtx, {
    type: 'line',
    data: {
        labels: ['6am','9am','12pm','3pm','6pm'],
        datasets: [{
            label: 'Tide',
            data: [1, 3, 2, 4, 3],
        }]
    }
});

const skyCtx = document.getElementById('skyChart');

new Chart(skyCtx, {
    type: 'bar',
    data: {
        labels: ['Morning','Noon','Evening'],
        datasets: [{
            label: 'Sky',
            data: [2, 4, 3],
        }]
    }
});
</script>

</body>
</html>
